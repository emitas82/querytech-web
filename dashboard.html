<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inversiones | QueryTECH</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        /* VARIABLES PARA TEMAS ALTERNABLES */
        body { 
            --bg-main: #070B14;
            --bg-topbar: #04070d;
            --border-topbar: #141b2b;
            --bg-card: #111827;
            --border-card: #1f2937;
            --bg-table: #0B1121;
            --border-table: #1e293b;
            --border-tr: #172033;
            --bg-tr-hover: #131B2F;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --text-slate: #64748b;
            --text-dark: #e2e8f0;
            --text-kpi-val: #f3f4f6;

            background-color: var(--bg-main); 
            font-family: 'Poppins', sans-serif; 
            color: var(--text-main); 
            overflow-x: hidden;
            transition: background-color 0.3s, color 0.3s;
        }

        /* CONFIGURACIÓN MODO CLARO */
        body.light-theme {
            --bg-main: #f8fafc;
            --bg-topbar: #f1f5f9;
            --border-topbar: #e2e8f0;
            --bg-card: #ffffff;
            --border-card: #e2e8f0;
            --bg-table: #ffffff;
            --border-table: #cbd5e1;
            --border-tr: #f1f5f9;
            --bg-tr-hover: #f8fafc;
            --text-main: #0f172a;
            --text-muted: #475569;
            --text-slate: #64748b;
            --text-dark: #1e293b;
            --text-kpi-val: #0f172a;
        }

        #view-loading { height: 100vh; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 20px; background: var(--bg-main); }
        #view-authenticated { display: none; }

        /* BARRA SUPERIOR TOTALMENTE ALINEADA A LA DERECHA SIN COMENTARIOS */
        .top-status-bar {
            width: 100%;
            background-color: var(--bg-topbar);
            border-bottom: 1px solid var(--border-topbar);
            padding: 8px 30px;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 20px;
            font-family: 'Roboto Mono', monospace;
            font-size: 13px;
            color: var(--text-muted);
            transition: background-color 0.3s, border-color 0.3s;
        }
        .top-status-text {
            display: flex;
            gap: 15px;
            align-items: center;
        }
        .top-status-text .site-tag {
            color: var(--text-muted);
            font-weight: 500;
        }
        .top-status-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .live-dot {
            width: 6px;
            height: 6px;
            background-color: #10b981;
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 8px #10b981;
        }

        /* BOTÓN DE INTERCAMBIO DE TEMA */
        .theme-toggle-btn {
            background: transparent;
            border: 1px solid var(--text-slate);
            color: var(--text-muted);
            padding: 2px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-family: 'Roboto Mono', monospace;
            font-size: 11px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .theme-toggle-btn:hover {
            color: var(--text-main);
            border-color: var(--text-main);
        }

        /* HEADER DEL DASHBOARD */
        .dashboard-header {
            max-width: 1500px;
            margin: 0 auto 30px auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            border-bottom: 1px solid var(--border-table);
        }
        .logo-container img {
            height: 50px;
            filter: drop-shadow(0 0 10px rgba(14, 165, 233, 0.3));
        }

        /* CARDS DE INDICADORES */
        .kpi-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            max-width: 1500px;
            margin: 0 auto 40px auto;
            padding: 0 20px;
        }
        .kpi-card {
            background: var(--bg-card);
            border: 1px solid var(--border-card);
            padding: 25px;
            border-radius: 8px;
            position: relative;
            overflow: hidden;
            transition: background-color 0.3s, border-color 0.3s;
        }
        .kpi-label { color: var(--text-muted); font-size: 13px; text-transform: uppercase; letter-spacing: 1px; font-weight: 500; }
        .kpi-value { font-size: 26px; font-weight: 700; margin-top: 8px; color: var(--text-kpi-val); }

        /* CONTENEDOR DE LA TABLA */
        .table-container {
            max-width: 1500px;
            margin: 0 auto;
            background: var(--bg-table);
            border-radius: 12px;
            border: 1px solid var(--border-table);
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            overflow-x: auto;
            transition: background-color 0.3s, border-color 0.3s;
        }
        .section-title { font-size: 20px; font-weight: 600; margin-bottom: 25px; display: flex; align-items: center; gap: 10px; color: var(--text-dark); }
        .section-title i { color: #38bdf8; }

        table { width: 100%; border-collapse: collapse; font-family: 'Poppins', sans-serif; white-space: nowrap; }
        
        th { 
            text-align: left; 
            padding: 16px 15px; 
            color: var(--text-slate); 
            font-size: 11px; 
            text-transform: uppercase; 
            letter-spacing: 1px;
            border-bottom: 1px solid var(--border-table); 
            cursor: pointer;
            user-select: none;
            transition: color 0.2s;
        }
        th:hover { color: var(--text-main); }
        th i { margin-left: 5px; font-size: 10px; opacity: 0.5; }
        th.active-sort i { opacity: 1; color: #38bdf8; }

        td { 
            padding: 16px 15px; 
            border-bottom: 1px solid var(--border-tr); 
            font-size: 14px; 
            color: var(--text-main);
            transition: background-color 0.2s ease; 
        }
        
        tr:hover td { background-color: var(--bg-tr-hover); }

        .numeric-cell { font-family: 'Roboto Mono', monospace; font-weight: 500; color: var(--text-dark); text-align: right; }
        .text-cell { text-align: left; }
        
        .ticker-cell { font-weight: 700; color: var(--text-main); }
        .tipo-cell { color: var(--text-muted); font-size: 13px; }
        .val-cell { color: #38bdf8; font-weight: 600; }

        .up { color: #10b981; font-weight: 600; }
        .down { color: #ef4444; font-weight: 600; }

        @keyframes flash-green { from { color: #10b981; } to { color: var(--text-dark); } }
        @keyframes flash-red { from { color: #ef4444; } to { color: var(--text-dark); } }
        .updated-up { animation: flash-green 1s ease-out; }
        .updated-down { animation: flash-red 1s ease-out; }

        .btn-logout { background: transparent; color: var(--text-muted); border: 1px solid var(--text-slate); padding: 8px 16px; border-radius: 6px; cursor: pointer; transition: all 0.3s; font-size: 14px; }
        .btn-logout:hover { background: #ef4444; color: white; border-color: #ef4444; }
    </style>
</head>
<body>

    <div id="view-loading">
        <div style="width: 40px; height: 40px; border: 4px solid #1e293b; border-top-color: #38bdf8; border-radius: 50%; animation: spin 1s linear infinite;"></div>
        <p style="letter-spacing: 1px; font-size: 13px; color: var(--text-muted); margin-top: 15px;">CONECTANDO AL SERVIDOR...</p>
    </div>

    <div id="view-authenticated">
